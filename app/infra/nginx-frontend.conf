# /etc/nginx/sites-available/salon-frontend
# Nginx sirve el build de Vite (React) en la subred pública
# Requiere: sudo apt install nginx -y

server {
    listen 80;
    listen [::]:80;
    server_name _;   # reemplazar por dominio o IP pública

    root /var/www/salon/dist;
    index index.html;

    # Gzip para assets estáticos
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;

    # SPA: todas las rutas no encontradas → index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agresivo para assets hasheados de Vite
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Health check del ALB
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Seguridad: ocultar versión de Nginx
    server_tokens off;

    # Headers de seguridad básicos
    add_header X-Frame-Options       SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy       strict-origin-when-cross-origin;
}
